<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanuman Chalisa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="sticky-header" id="stickyHeader" aria-hidden="true">
    <div class="sticky-header-inner">Hanuman Chalisa</div>
  </div>

  <div class="page">
    <main class="content">
      <header class="page-header">
        <p class="hindi-title">॥ श्री हनुमान चालीसा ॥</p>
        <h1>Hanuman Chalisa</h1>
        <div class="title-divider" aria-hidden="true"></div>
      </header>

      <section class="stanzas" id="stanzaContainer" aria-label="Hanuman Chalisa verses"></section>

      <div class="bottom-spacer" aria-hidden="true"></div>
    </main>
  </div>

  <footer class="sticky-footer" id="stickyFooter" aria-hidden="true">
    <div class="sticky-footer-inner">
      <span class="om">॥ ॐ ॥</span>
      <button class="scroll-top" id="scrollTopBtn" type="button" aria-label="Scroll to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="m5 12 7-7 7 7"></path>
          <path d="M12 19V5"></path>
        </svg>
      </button>
    </div>
  </footer>

  <script>
    const STANZAS = [
      { lines: [
        'Shri Guru Charan Saroj Raj',
        'Nij mane mukure sudhar',
        'Varnao Raghuvar Vimal Jasu',
        'Jo dayaku phal char',
      ] },
      { lines: [
        'Budhi Hin Tanu Janike',
        'Sumirau Pavan Kumar',
        'Bal budhi Vidya dehu mohe',
        'Harahu Kalesa Vikar',
      ] },
      { lines: [
        'Jai Hanuman gyan gun sagar',
        'Jai Kapis tihun lok ujagar',
      ] },
      { lines: [
        'Ram doot atulit bal dhama',
        'Anjani-putra Pavan sut nama',
      ] },
      { lines: [
        'Mahavir Vikram Bajrangi',
        'Kumati nivar sumati Ke sangi',
      ] },
      { lines: [
        'Kanchan varan viraj subesa',
        'Kanan Kundal Kunchit Kesa',
      ] },
      { lines: [
        'Hath Vajra Aur Dhuvaje Viraje',
        'Kandhe moonj janehu sajai',
      ] },
      { lines: [
        'Sankar suvan kesri Nandan',
        'Tej pratap maha jag vandan',
      ] },
      { lines: [
        'Vidyavan guni ati chatur',
        'Ram kaj karibe ko aatur',
      ] },
      { lines: [
        'Prabu charitra sunibe ko rasiya',
        'Ram Lakhan Sita man Basiya',
      ] },
      { lines: [
        'Sukshma roop dhari Siyahi dikhava',
        'Vikat roop dhari lanka jarava',
      ] },
      { lines: [
        'Bhima roop dhari asur sanghare',
        'Ramachandra ke kaj sanvare',
      ] },
      { lines: [
        'Laye Sanjivan Lakhan Jiyaye',
        'Shri Raghuvir Harashi ur laye',
      ] },
      { lines: [
        'Raghupati Kinhi bahut badai',
        'Tum mam priye Bharat-hi sam bhai',
      ] },
      { lines: [
        'Sahas badan tumharo yash gaave',
        'Us kahi Shripati kanth lagaave',
      ] },
      { lines: [
        'Sankadik Brahmadi Muneesa',
        'Narad Sarad sahit Aheesa',
      ] },
      { lines: [
        'Yam Kuber Digpal Jahan te',
        'Kavi kovid kahi sake kahan te',
      ] },
      { lines: [
        'Tum upkar Sugreevahin keenha',
        'Ram milaye rajpad deenha',
        'Tumharo mantra Vibheeshan mana',
        'Lankeshwar Bhaye Sub jag jana',
      ] },
      { lines: [
        'Yug sahastra jojan par Bhanu',
        'Leelyo tahi madhur phal janu',
      ] },
      { lines: [
        'Prabhu mudrika meli mukh mahee',
        'Jaladhi langhi gaye achraj nahee',
      ] },
      { lines: [
        'Durgaam kaj jagat ke jete',
        'Sugam anugraha tumhre tete',
      ] },
      { lines: [
        'Ram dware tum rakhvare,',
        'Hoat na agya binu paisare',
      ] },
      { lines: [
        'Sub sukh lahai tumhari sarna',
        'Tum rakshak kahu ko dar na',
      ] },
      { lines: [
        'Aapan tej samharo aapai',
        'Teenhon lok hank te kanpai',
      ] },
      { lines: [
        'Bhoot pisach Nikat nahin aavai',
        'Mahavir jab naam sunavai',
      ] },
      { lines: [
        'Nase rog harai sab peera',
        'Japat nirantar Hanumant beera',
      ] },
      { lines: [
        'Sankat se Hanuman chudavai',
        'Man Karam Vachan dyan jo lavai',
      ] },
      { lines: [
        'Sub par Ram tapasvee raja',
        'Tin ke kaj sakal Tum saja',
      ] },
      { lines: [
        'Aur manorath jo koi lavai',
        'Sohi amit jeevan phal pavai',
      ] },
      { lines: [
        'Charon Yug partap tumhara',
        'Hai persidh jagat ujiyara',
      ] },
      { lines: [
        'Sadhu Sant ke tum Rakhware',
        'Asur nikandan Ram dulhare',
      ] },
      { lines: [
        'Ashta sidhi nav nidhi ke dhata',
        'Us var deen Janki mata',
      ] },
      { lines: [
        'Ram rasayan tumhare pasa',
        'Sada raho Raghupati ke dasa',
      ] },
      { lines: [
        'Tumhare bhajan Ram ko pavai',
        'Janam janam ke dukh bisravai',
      ] },
      { lines: [
        'Anth kaal Raghuvir pur jayee',
        'Jahan janam Hari-Bakht Kahayee',
      ] },
      { lines: [
        'Aur Devta Chit na dharehi',
        'Hanumanth se hi sarve sukh karehi',
      ] },
      { lines: [
        'Sankat kate mite sab peera',
        'Jo sumirai Hanumat Balbeera',
      ] },
      { lines: [
        'Jai Jai Jai Hanuman Gosahin',
        'Kripa Karahu Gurudev ki nyahin',
      ] },
      { lines: [
        'Jo sat bar path kare kohi',
        'Chutehi bandhi maha sukh hohi',
      ] },
      { lines: [
        'Jo yah padhe Hanuman Chalisa',
        'Hoye siddhi sakhi Gaureesa',
      ] },
      { lines: [
        'Tulsidas sada hari chera',
        'Keejai Das Hrdaye mein dera',
      ] },
      { lines: [
        'Pavantnai sankat haran,',
        'Mangal murti roop.',
        'Ram Lakhan Sita sahit,',
        'Hrdaye basahu sur bhoop.',
      ] },
    ];

    const stanzaContainer = document.getElementById('stanzaContainer');
    const scrollTopBtn = document.getElementById('scrollTopBtn');

    STANZAS.forEach((stanza) => {
      const stanzaEl = document.createElement('div');
      stanzaEl.className = 'stanza';

      stanza.lines.forEach((line) => {
        const p = document.createElement('p');
        p.className = 'stanza-line';
        p.textContent = line;
        stanzaEl.appendChild(p);
      });

      stanzaContainer.appendChild(stanzaEl);
    });

    const onScroll = () => {
      document.body.classList.toggle('is-scrolled', window.scrollY > 80);
    };

    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    scrollTopBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
